name: Track Knightfall Player Count

on:
  schedule:
    # Runs daily at 8:00 PM UTC (good overlap for EU evening + US afternoon)
    - cron: "0 20 * * *"
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use a token that can push commits back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run player count tracker
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_THRESHOLD: ${{ secrets.ALERT_THRESHOLD }}
        run: python tools/track_player_count.py

      - name: Commit updated log to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/player_count_log.csv
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: daily player count log [skip ci]"
          git push
